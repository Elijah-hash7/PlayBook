<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playbook Access</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --surface: #0d0d1a;
    --surface2: #121220;
    --border: #22223a;
    --green: #00e5a0;
    --text: #e0e0f0;
    --muted: #6f6f95;
    --red: #ff4d6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
    color: var(--text);
    background:
      radial-gradient(circle at 20% 15%, rgba(0,229,160,0.16), transparent 35%),
      radial-gradient(circle at 80% 75%, rgba(77,159,255,0.12), transparent 40%),
      var(--bg);
    font-family: "JetBrains Mono", monospace;
  }
  .card {
    width: min(100%, 460px);
    border-radius: 18px;
    border: 1px solid var(--border);
    background: linear-gradient(145deg, rgba(18,18,32,0.96), rgba(13,13,26,0.96));
    padding: 30px;
    box-shadow: 0 28px 68px rgba(0,0,0,0.42);
  }
  .kicker {
    color: var(--green);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-family: "Syne", sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    line-height: 0.95;
    margin-bottom: 10px;
  }
  p {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
    margin-bottom: 18px;
  }
  form { display: grid; gap: 10px; }
  input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font: inherit;
    font-size: 12px;
    padding: 13px 14px;
    outline: none;
  }
  input:focus {
    border-color: rgba(0,229,160,0.46);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
  }
  button {
    border: 0;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--green), #43f2c2);
    color: #03140f;
    font: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 13px 14px;
    cursor: pointer;
  }
  .error {
    min-height: 18px;
    color: var(--red);
    font-size: 11px;
  }
  .meta {
    margin-top: 10px;
    color: var(--muted);
    font-size: 10px;
  }
  @media (max-width: 640px) {
    .card {
      border-radius: 14px;
      padding: 22px 18px;
    }
    h1 { font-size: clamp(24px, 11vw, 34px); line-height: 1; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="kicker">Restricted Access</div>
    <h1>Enter The Password</h1>
    <p>This playbook is protected by server-side auth. Sessions expire in 5 minutes.</p>

    <form id="loginForm">
      <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
      <button type="submit">Unlock Playbook</button>
      <div class="error" id="error" aria-live="polite"></div>
    </form>

    <div class="meta">Password is verified on the server, not in page source.</div>
  </main>

<script>
  const form = document.getElementById("loginForm");
  const passwordInput = document.getElementById("password");
  const errorEl = document.getElementById("error");

  passwordInput.focus();

  form.addEventListener("submit", async function (event) {
    event.preventDefault();
    errorEl.textContent = "";

    const password = passwordInput.value.trim();
    if (!password) {
      errorEl.textContent = "Enter a password.";
      return;
    }

    try {
      const response = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });

      if (!response.ok) {
        errorEl.textContent = response.status === 401 ? "Wrong password." : "Login failed. Try again.";
        passwordInput.select();
        return;
      }

      window.location.href = "/playbook";
    } catch (error) {
      errorEl.textContent = "Network error. Try again.";
    }
  });
</script>
</body>
</html>
